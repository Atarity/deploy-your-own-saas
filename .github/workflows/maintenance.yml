name: Maintenance
on:
  push:
    branches:
      - 'keep-alive'
  schedule:
    - cron: "30 14 * * *"
  workflow_dispatch:

env:
  GH_ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Update project data
        run: python3 keep-alive.py

      - name: Generate README
        run: python3 readme-gen.py

      - name: Commit and push changes
        run: |
          git config --global user.email "actions@users.noreply.github.com"
          git config --global user.name "Maintenance"
          git add dyos-db.json README.md
          git commit -m "Update stars and activity stats [skip ci]" || echo "No changes to commit"
          git push
